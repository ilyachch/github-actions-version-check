name: Release On Main
on:
  workflow_dispatch:
#  push:
#    branches:
#      - main
permissions:
  contents: write
jobs:
  checks:
    uses: ./.github/workflows/ci.yml
  release:
    name: Create GitHub Release If Version Changed
    runs-on: ubuntu-latest
    needs:
      - checks
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.sha }}
      - name: Setup uv
        uses: astral-sh/setup-uv@v8.1.0
      - name: Read package version
        id: package_version
        run: |
          version=$(uv version --short)
          echo "version=$version" >> "$GITHUB_OUTPUT"
      - name: Read latest released version
        id: latest_release
        uses: actions/github-script@v9.0.0
        with:
          script: |
            try {
              const { data } = await github.rest.repos.getLatestRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
              });
              core.setOutput("tag", data.tag_name);
            } catch (error) {
              if (error.status === 404) {
                core.setOutput("tag", "");
                return;
              }
              throw error;
            }
      - name: Decide whether release is needed
        id: should_release
        env:
          CURRENT_VERSION: ${{ steps.package_version.outputs.version }}
          LATEST_TAG: ${{ steps.latest_release.outputs.tag }}
        run: |
          latest_version="${LATEST_TAG#v}"
          release_tag="v${CURRENT_VERSION}"

          if [ "$CURRENT_VERSION" = "$latest_version" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "tag=$release_tag" >> "$GITHUB_OUTPUT"
            echo "Version unchanged ($CURRENT_VERSION); release will be skipped."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "tag=$release_tag" >> "$GITHUB_OUTPUT"
            echo "Version changed ($latest_version -> $CURRENT_VERSION); release will be created."
          fi
      - name: Create GitHub release
        if: steps.should_release.outputs.changed == 'true'
        uses: softprops/action-gh-release@v3.0.0
        with:
          tag_name: ${{ steps.should_release.outputs.tag }}
          name: ${{ steps.should_release.outputs.tag }}
          generate_release_notes: true
          target_commitish: ${{ github.sha }}
