name: CI
on:
  pull_request:
  workflow_call:
jobs:
  checks:
    name: Lint And Checks (py3.13)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Setup uv
        uses: astral-sh/setup-uv@v8.1.0
      - name: Install prek
        uses: j178/prek-action@v2.0.2
      - name: Sync dependencies
        run: uv sync --all-groups --frozen
      - name: Run linters
        run: prek run -a
      - name: Run mypy
        run: uv run mypy
  tests:
    name: Tests (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs:
      - checks
    strategy:
      matrix:
        python-version:
          - '3.11'
          - '3.12'
          - '3.13'
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
      - name: Setup uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Sync dependencies
        run: uv sync --all-groups --frozen
      - name: Run tests
        run: uv run pytest
